name: Chu1TestKit
options:
  bundleIdPrefix: jp.taka
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Chu1TestKit:
    type: application
    platform: iOS
    sources:
      - Chu1TestKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.taka.chu1testkit
        INFOPLIST_FILE: Chu1TestKit/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chu1TestKit/Chu1TestKit.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  Chu1TestKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Chu1TestKitTests
    dependencies:
      - target: Chu1TestKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.taka.chu1testkit.tests
        INFOPLIST_FILE: Chu1TestKitTests/Info.plist
schemes:
  Chu1TestKit:
    build:
      targets:
        Chu1TestKit: all
        Chu1TestKitTests: [test]
    test:
      targets:
        - Chu1TestKitTests
